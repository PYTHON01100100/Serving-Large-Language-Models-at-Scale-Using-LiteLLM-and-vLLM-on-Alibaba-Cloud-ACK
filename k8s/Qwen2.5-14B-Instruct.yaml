apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen2-5-14b-instruct  # normalized: dots replaced with dashes
  namespace: your-namespace
  labels:
    app: qwen2-5-14b-instruct  # normalized: dots replaced with dashes
spec:
  replicas: 1
  
  selector:
    matchLabels:
      app: qwen2-5-14b-instruct  # normalized: dots replaced with dashes
  template:
    metadata:
      labels:
        app: qwen2-5-14b-instruct  # normalized: dots replaced with dashes
    spec:
      nodeName: me-central-1.10.3.1.166
      volumes:
        - name: qwen2-5-14b-instruct-pvc
          persistentVolumeClaim:
            claimName: qwen2-5-14b-instruct-pvc	
        # vLLM needs to access the host's shared memory for tensor parallel inference.
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: "2Gi"
      containers:
        - name: vllm-container
          image: vllm/vllm-openai
          imagePullPolicy: IfNotPresent #Always
          command: ["/bin/sh", "-c"]
          args:
            - >
              vllm serve /mnt/OSSbuket/Qwen2.5-14B-Instruct
              --host 0.0.0.0
              --port 8000
              --served-model-name Qwen2.5-14B-Instruct
              --enable-chunked-prefill
              --max-num-batched-tokens 1024
              --max-model-len 6144
              --gpu-memory-utilization 0.95
              --trust-remote-code
              --enforce-eager
              --enable-chunked-prefill
              --enable-auto-tool-choice
              --tool-call-parser hermes  

              
          ports:
            - containerPort: 8000
              protocol: TCP
          resources:
            limits:
              cpu: "10"
              memory: 20G
              nvidia.com/gpu: "1"
            requests:
              cpu: "2"
              memory: 6G
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: qwen2-5-14b-instruct-pvc	
              mountPath: /mnt/OSSbuket/Qwen2.5-14B-Instruct
            - name: shm
              mountPath: /dev/shm
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 5
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      schedulerName: default-scheduler
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
---
apiVersion: v1
kind: Service
metadata:
  name: qwen2-5-14b-instruct-lb
  namespace: your-namespace
  labels:
    app: qwen2-5-14b-instruct
  annotations:
spec:
  type: ClusterIP  # <-- CHANGED: Now internal only
  ports:
    - name: http
      port: 8000
      protocol: TCP
      targetPort: 8000
  selector:
    app: qwen2-5-14b-instruct  # normalized: dots replaced with dashes


# externalTrafficPolicy: "Local"